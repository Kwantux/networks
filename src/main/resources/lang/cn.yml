help: "\n <bold><dark_green>          Networks v<1> - 帮助菜单 \n============================================</dark_green></bold>\n\
    \n<click:suggest_command:/net create>/net create (id)</click> - <yellow>创建一个新网络</yellow>\
    \ \n<click:suggest_command:/net rename>/net rename (id)</click> - <yellow>重命名网络</yellow>\
    \ \n<click:suggest_command:/net delete>/net delete (id)</click> - <yellow>删除网络</yellow>\
    \ \n \n<click:suggest_command:/net select>/net select (id)</click> - <yellow>选择一个网络</yellow>\
    \ \n \n<click:suggest_command:/net list>/net list</click> - <yellow>列出所有你的网络</yellow>\
    \ \n<click:suggest_command:/net listall>/net listall</click> - <yellow>列出服务器上所有网络</yellow>\
    \ \n<click:suggest_command:/net list>/net list (player)</click> - <yellow>列出其他玩家的网络</yellow>\
    \ \n \n<click:suggest_command:/net user add>/net user add (player)</click> - <yellow>授予玩家访问你网络的权限</yellow>\
    \ \n<click:suggest_command:/net user remove>/net user remove (player)</click>\
    \ - <yellow>撤销玩家对你网络的访问权限</yellow> \n \n<click:suggest_command:/net\
    \ items>/net items</click> - <yellow>列出你所有的物品</yellow> \n \n<click:suggest_command:/net\
    \ merge>/net merge (net1) (net2)</click> - <yellow>将 net2 合并到 net1</yellow>\
    \ \n \n<blue><click:open_url:'https://networks.kwantux.de'>[打开用户手册]</click></blue>\
    \ \n "
help.admin: "\n <bold><dark_green>          Networks v<1> - 帮助菜单 \n============================================</dark_green></bold>\n\
    \n<click:suggest_command:/net data save>/net data save</click> - <yellow>保存所有网络</yellow>\
    \ \n<click:suggest_command:/net data reload>/net data reload</click> - <yellow>重载配置文件</yellow>\
    \ \n \n<click:suggest_command:/net create>/net create (id)</click> - <yellow>创建一个新网络</yellow>\
    \ \n<click:suggest_command:/net rename>/net rename (id)</click> - <yellow>重命名网络</yellow>\
    \ \n<click:suggest_command:/net delete>/net delete (id)</click> - <yellow>删除网络</yellow>\
    \ \n \n<click:suggest_command:/net select>/net select (id)</click> - <yellow>选择一个网络</yellow>\
    \ \n \n<click:suggest_command:/net list>/net list</click> - <yellow>列出所有你的网络</yellow>\
    \ \n<click:suggest_command:/net listall>/net listall</click> - <yellow>列出服务器上所有网络</yellow>\
    \ \n<click:suggest_command:/net list>/net list (player)</click> - <yellow>列出其他玩家的网络</yellow>\
    \ \n \n<click:suggest_command:/net user add>/net user add (player)</click> - <yellow>授予玩家访问你网络的权限</yellow>\
    \ \n<click:suggest_command:/net user remove>/net user remove (player)</click>\
    \ - <yellow>撤销玩家对你网络的访问权限</yellow> \n \n<click:suggest_command:/net\
    \ items>/net items</click> - <yellow>列出你所有的物品</yellow> \n \n<click:suggest_command:/net\
    \ merge>/net merge (net1) (net2)</click> - <yellow>将 net2 合并到 net1</yellow>\
    \ \n \n<blue><click:open_url:'https://networks.kwantux.de'>[打开用户手册]</click>\
    \ \n "
